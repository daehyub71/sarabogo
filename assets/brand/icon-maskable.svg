<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="살아보고 앱 아이콘 (maskable)">
  <!--
    maskable 변형 — 안드로이드가 원형/스퀘어클 등 임의 모양으로 잘라낸다.
    안전영역(중앙 80%) 안에 마크를 넣어야 잘려도 살아남는다.
    icon.svg와 같은 마크를 약 72%로 축소해 여백을 확보했다.
  -->
  <rect width="512" height="512" fill="#1f6f54"/>

  <g transform="translate(256 256) scale(0.72) translate(-256 -256)">
    <!-- 해 -->
    <circle cx="352" cy="150" r="42" fill="#e08a4a"/>

    <!-- 집 -->
    <path d="M256 118 L142 214 L142 226 L170 226 L170 384 A16 16 0 0 0 186 400 L326 400 A16 16 0 0 0 342 384 L342 226 L370 226 L370 214 Z"
          fill="#ffffff"/>

    <!-- 문 -->
    <path d="M226 400 L226 306 A30 30 0 0 1 286 306 L286 400 Z" fill="#1f6f54"/>
  </g>
</svg>
