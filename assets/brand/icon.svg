<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="살아보고 앱 아이콘">
  <!--
    살아보고 앱 아이콘.
    - 배경: 브랜드 딥그린 (tokens.css 의 color-accent · #1f6f54)
    - 집 실루엣: "여기서 한 달 산다"
    - 해(웜 오렌지): 지역살이의 온기 · 시선 유도
    시니어 가독성 우선 — 32px로 줄여도 형태가 뭉개지지 않도록 획을 두껍게 유지.
  -->
  <rect width="512" height="512" rx="112" fill="#1f6f54"/>

  <!-- 해 -->
  <circle cx="352" cy="150" r="42" fill="#e08a4a"/>

  <!-- 집: 지붕 + 몸체 (흰 실루엣, 굵은 형태) -->
  <path d="M256 118 L142 214 L142 226 L170 226 L170 384 A16 16 0 0 0 186 400 L326 400 A16 16 0 0 0 342 384 L342 226 L370 226 L370 214 Z"
        fill="#ffffff"/>

  <!-- 문: 배경색으로 파내 대비 확보 -->
  <path d="M226 400 L226 306 A30 30 0 0 1 286 306 L286 400 Z" fill="#1f6f54"/>
</svg>
